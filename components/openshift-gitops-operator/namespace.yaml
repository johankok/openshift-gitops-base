---
apiVersion: v1
kind: Namespace
metadata:
  name: openshift-gitops-operator
  labels:
    kubernetes.io/metadata.name: openshift-gitops-operator
    openshift.io/cluster-monitoring: "true"
    pod-security.kubernetes.io/audit-version: latest
